services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
      - tectonic-cache:/root/.cache/Tectonic
    environment:
      - STORAGE_PATH=/app/storage
      - LATEX_DOCKER_IMAGE=resumebuilder-latex-compiler
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - latex-compiler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    command: npm run dev -- --host 0.0.0.0

  latex-compiler:
    build:
      context: ./latex-compiler
      dockerfile: Dockerfile
    image: resumebuilder-latex-compiler
    volumes:
      - ./backend/storage:/compile
    command: ["sleep", "infinity"] # Keep container running

volumes:
  storage:
  node_modules:
  tectonic-cache:
